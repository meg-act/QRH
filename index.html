<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホで早押しボタン！</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f4f9; }
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        input[type="text"] { padding: 10px; font-size: 16px; width: 80%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; color: white; background-color: #007BFF; transition: 0.2s; margin: 5px; }
        button:hover { opacity: 0.8; }
        
        #buzzer-btn { width: 200px; height: 200px; border-radius: 50%; font-size: 32px; font-weight: bold; background-color: #dc3545; box-shadow: 0 10px 0 #a71d2a; margin-top: 30px; }
        #buzzer-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #a71d2a; }
        #buzzer-btn:disabled { background-color: #ccc; box-shadow: 0 10px 0 #999; cursor: not-allowed; transform: none; }
        
        #winner-display { font-size: 28px; color: #333; font-weight: bold; margin: 20px 0; min-height: 40px; }
        .player-list { text-align: left; background: #eee; padding: 10px; border-radius: 5px; margin-top: 20px; font-size: 14px; }
        
        .judge-btn { font-size: 24px; padding: 15px 40px; margin: 10px; font-weight: bold; }
        .btn-correct { background-color: #007bff; }
        .btn-incorrect { background-color: #dc3545; }
        .btn-reset { background-color: #28a745; width: 80%; margin-top: 20px; }
        .btn-copy { background-color: #6c757d; font-size: 14px; padding: 8px 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>早押しシステム</h1>

    <div id="init-screen">
        <p id="loading-msg">通信の準備中...</p>
        <div id="host-setup" class="hidden">
            <p>この端末をクイズの親機（出題者）にしますか？</p>
            <button onclick="startHost()">親機になる</button>
        </div>
        <div id="player-setup" class="hidden">
            <p>あなたの名前を入力してください</p>
            <input type="text" id="player-name" placeholder="名前 (例: 山田)">
            <br>
            <button onclick="joinGame()">参加する</button>
        </div>
    </div>

    <div id="host-screen" class="hidden">
        <p style="font-size: 14px;">参加者はQRコードを読むか、リンクから参加してください</p>
        <img id="qrcode" src="" alt="QR Code" style="width: 150px; height: 150px;">
        <br>
        <button class="btn-copy" onclick="copyJoinLink()">🔗 参加用リンクをコピー</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <div id="winner-display">待機中...</div>

        <div id="judge-controls" class="hidden">
            <button class="judge-btn btn-correct" onclick="judge(true)">〇 正解</button>
            <button class="judge-btn btn-incorrect" onclick="judge(false)">× 不正解</button>
        </div>

        <button class="btn-reset" onclick="resetBuzzer()">リセット (全員のボタンを復活)</button>

        <div class="player-list">
            <strong>接続中のプレイヤー:</strong>
            <ul id="connected-players"></ul>
        </div>
    </div>

    <div id="player-screen" class="hidden">
        <h2 id="player-status">準備完了！</h2>
        <button id="buzzer-btn" onclick="pushBuzzer()">押す！</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const hostIdParam = urlParams.get('host');

    let peer = null;
    let myName = "";
    let connections = []; 
    let isLocked = false; 
    let currentAnsweringName = "";
    let currentJoinUrl = "";
    let hostConnection = null;

    window.onload = () => {
        peer = new Peer(); 
        peer.on('open', (id) => {
            document.getElementById('loading-msg').classList.add('hidden');
            if (hostIdParam) {
                document.getElementById('player-setup').classList.remove('hidden');
            } else {
                document.getElementById('host-setup').classList.remove('hidden');
            }
        });
    };

    // --- 親機の処理 ---
    function startHost() {
        document.getElementById('init-screen').classList.add('hidden');
        document.getElementById('host-screen').classList.remove('hidden');

        currentJoinUrl = window.location.href.split('?')[0] + '?host=' + peer.id;
        document.getElementById('qrcode').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(currentJoinUrl);

        peer.on('connection', (conn) => {
            connections.push(conn);
            conn.on('data', (data) => {
                if (data.type === 'join') {
                    const li = document.createElement('li');
                    li.innerText = data.name;
                    li.id = 'player-' + conn.peer;
                    document.getElementById('connected-players').appendChild(li);
                }
                if (data.type === 'buzz' && !isLocked) {
                    isLocked = true;
                    currentAnsweringName = data.name;
                    document.getElementById('winner-display').innerText = data.name + ' さんが解答中！';
                    document.getElementById('judge-controls').classList.remove('hidden');
                    broadcast({ type: 'answering', name: data.name });
                }
            });
            conn.on('close', () => {
                const el = document.getElementById('player-' + conn.peer);
                if(el) el.remove();
            });
        });
    }

    function copyJoinLink() {
        navigator.clipboard.writeText(currentJoinUrl).then(() => {
            alert("コピーしました！");
        }).catch(() => {
            alert("コピーに失敗しました。");
        });
    }

    function judge(isCorrect) {
        document.getElementById('judge-controls').classList.add('hidden');
        if (isCorrect) {
            document.getElementById('winner-display').innerText = currentAnsweringName + ' さん正解！';
            broadcast({ type: 'correct', name: currentAnsweringName });
        } else {
            // 不正解の場合は即座にロック解除して続行
            document.getElementById('winner-display').innerText = '待機中... (前回不正解: ' + currentAnsweringName + ')';
            isLocked = false;
            currentAnsweringName = "";
            broadcast({ type: 'incorrect' });
        }
    }

    function resetBuzzer() {
        isLocked = false;
        currentAnsweringName = "";
        document.getElementById('judge-controls').classList.add('hidden');
        document.getElementById('winner-display').innerText = '待機中...';
        broadcast({ type: 'reset' });
    }

    function broadcast(data) {
        connections.forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    // --- 子機の処理 ---
    function joinGame() {
        myName = document.getElementById('player-name').value;
        if (!myName) {
            alert('名前を入力してください！');
            return;
        }
        document.getElementById('init-screen').classList.add('hidden');
        document.getElementById('player-screen').classList.remove('hidden');
        document.getElementById('player-status').innerText = '親機に接続中...';

        hostConnection = peer.connect(hostIdParam);
        hostConnection.on('open', () => {
            document.getElementById('player-status').innerText = '準備完了！';
            hostConnection.send({ type: 'join', name: myName });
        });

        hostConnection.on('data', (data) => {
            const statusEl = document.getElementById('player-status');
            const btnEl = document.getElementById('buzzer-btn');

            if (data.type === 'answering') {
                btnEl.disabled = true;
                statusEl.innerText = (data.name === myName) ? 'あなたの番です！' : data.name + ' さんが解答中...';
            } 
            else if (data.type === 'correct') {
                btnEl.disabled = true;
                statusEl.innerText = (data.name === myName) ? '大正解！' : data.name + ' さんが正解しました';
            } 
            else if (data.type === 'incorrect') {
                // 誰かが不正解になったら全員のボタンが即復活
                btnEl.disabled = false;
                statusEl.innerText = '不正解！誰でも押せます！';
            } 
            else if (data.type === 'reset') {
                btnEl.disabled = false;
                statusEl.innerText = '準備完了！';
            }
        });
    }

    function pushBuzzer() {
        document.getElementById('buzzer-btn').disabled = true;
        if (hostConnection && hostConnection.open) {
            hostConnection.send({ type: 'buzz', name: myName });
        }
    }
</script>

</body>
</html>
